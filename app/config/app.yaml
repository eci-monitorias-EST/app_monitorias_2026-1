{
  "app": {
    "title": "Bankify Monitorias",
    "theme_color": "#00c29b",
    "hero_gradient": "linear-gradient(120deg, #5a0087 0%, #004be0 55%, #00e0b4 100%)"
  },
  "persistence": {
    "store": "sqlite",
    "sqlite_path": "data/processed/app.db",
    "local_state_path": "data/processed/app_state.json",
    "sync_to_apps_script": false,
    "request_timeout_seconds": 10
  },
  "comments": {
    "embedding_provider": "auto",
    "preferred_embedding_provider": "minilm",
    "fallback_embedding_provider": "fasttext",
    "embedding_version": "minilm_clean_comment_v1",
    "projection_version": "projection_cache_v1",
    "embedding_dimensions": 64,
    "minilm_model_name": "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2",
    "minilm_cache_folder": "",
    "fasttext_model_path": "",
    "min_comment_length": 12,
    "source_snapshot_limit": 500
  },
  "modeling": {
    "random_state": 42,
    "max_rows_3d": 400,
    "umap_neighbors": 10
  }
}
